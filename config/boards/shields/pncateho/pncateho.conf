# Отключаем ненужные аппаратные функции
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_DISPLAY=n

# Настройки питания (для проводной не обязательны, но безопасны)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# Имя клавиатуры (отобразится в системе)
CONFIG_ZMK_KEYBOARD_NAME="PNCATEHO"

# Явно отключаем Bluetooth и включаем USB (критично для проводной работы)
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# Оптимизация размера прошивки (помогает избежать переполнения)
CONFIG_SIZE_OPTIMIZATIONS=y

# Поддержка комбо (аккордов) — если они используются
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=128
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=10
CONFIG_ZMK_COMBO_MAX_PRESSED_COMBOS=10

# ZMK Studio (пока отключено, можно включить позже раскомментировав)
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n