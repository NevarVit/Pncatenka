# Отключаем Bluetooth и включаем USB
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# Оптимизация размера
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_BOOTLOADER_MCUBOOT=n

# Отключаем ненужную периферию
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_DISPLAY=n

# Настройки сна (опционально)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# Имя клавиатуры
CONFIG_ZMK_KEYBOARD_NAME="PNCATEHO"

# Настройки комбо (как в risateno)
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=128
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=10
CONFIG_ZMK_COMBO_MAX_PRESSED_COMBOS=10

# ZMK Studio (пока отключено)
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n